services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${SERVICE_PORT:-8000}:8000"
    volumes:
      - ${MODEL_CACHE_HOST_DIR:-./.cache/models/huggingface}:${HF_HOME:-/models/cache/huggingface}
    gpus: all
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 120
      start_period: 20s

